<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNM</title>
    <style>
        /* Gaya untuk Container */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Mengisi tinggi layar penuh, sesuaikan jika perlu */
            overflow: hidden;
            background-color: #ffffff;
            border-radius: 8px; /* Opsional: memberikan sudut melengkung */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Gaya untuk Iframe */
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Gaya untuk Layar Loader */
        .loader-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f8f9fa; /* Warna background loader */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10; /* Memastikan loader berada di atas iframe */
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        /* Animasi Spinner Cantik */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e1e4e8;
            border-top: 6px solid #6c5ce7; /* Warna utama (ungu cantik) */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Teks di bawah spinner */
        .loader-text {
            margin-top: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            color: #6c5ce7;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Keyframes untuk putaran spinner */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Keyframes untuk teks berkedip halus */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <div id="loader" class="loader-screen">
            <div class="spinner"></div>
            <div class="loader-text">Memuat Data...</div>
        </div>

        <iframe 
            id="gscriptIframe" 
            src="https://script.google.com/macros/s/AKfycbwTdacXQKAnMSD1d5HSkQoUoHEc9bzJTvRzWhBFjrdig42teLb9UkSj7iM3iE8TH1I/exec" 
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Mengambil elemen iframe dan loader
        const iframe = document.getElementById('gscriptIframe');
        const loader = document.getElementById('loader');

        // Event listener: Saat iframe selesai dimuat, sembunyikan loader
        iframe.onload = function() {
            // Mengubah opacity menjadi 0 agar efek transisi CSS berjalan
            loader.style.opacity = '0';
            
            // Menunggu transisi selesai (0.5 detik) sebelum benar-benar menghilangkan elemen
            setTimeout(() => {
                loader.style.visibility = 'hidden';
                loader.style.display = 'none';
            }, 500);
        };
    </script>

</body>
</html>
